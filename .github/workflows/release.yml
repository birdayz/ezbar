name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build + publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libfontconfig1-dev libxkbcommon-dev libwayland-dev
      - name: Build
        run: cargo build --release --bin ezbar
      - name: Package
        run: |
          bin=ezbar-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          install -Dm755 target/release/ezbar "$bin"
          strip "$bin" || true
          sha256sum "$bin" > "$bin.sha256"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ezbar-${{ github.ref_name }}-x86_64-unknown-linux-gnu
            ezbar-${{ github.ref_name }}-x86_64-unknown-linux-gnu.sha256
          generate_release_notes: true
